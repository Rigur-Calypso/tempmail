version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tempmail_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tempmail
      POSTGRES_PASSWORD: tempmail_dev_password
      POSTGRES_DB: tempmail_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
